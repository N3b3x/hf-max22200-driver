# ESP32 MAX22200 Driver - Apps Configuration
# This file centralizes all app definitions, their source files, and metadata
# Used by build scripts, flash scripts, CI workflows, and CMake
#
# HIERARCHICAL CONFIGURATION:
# - Global settings in 'metadata' section apply to all apps by default
# - Individual apps can override 'idf_versions' and 'build_types' if needed
# - Apps without overrides use global settings automatically

version: "1.0"

metadata:
  project: "ESP32 MAX22200 Driver Examples"
  default_app: "max22200_comprehensive_test"
  target: "esp32s3"
  idf_versions: ["release/v5.5", "release/v5.4"]
  build_types: [["Debug", "Release"], ["Debug"]]

apps:
  # --------------------------------------------------------------------------
  # Comprehensive Test Suite
  # --------------------------------------------------------------------------
  max22200_comprehensive_test:
    description: "Comprehensive MAX22200 driver test suite covering all functionality"
    source_file: "max22200_comprehensive_test.cpp"
    category: "test"
    idf_versions: ["release/v5.5"]
    build_types: ["Debug", "Release"]
    ci_enabled: true
    featured: true
    documentation: "README.md"

  # --------------------------------------------------------------------------
  # Solenoid / Valve test (all 8 channels, C21-style, diagnostics)
  # --------------------------------------------------------------------------
  max22200_solenoid_valve_test:
    description: "Solenoid/valve test: all 8 channels, C21 hit/hold, sequential and parallel patterns, full diagnostics"
    source_file: "max22200_solenoid_valve_test.cpp"
    category: "test"
    idf_versions: ["release/v5.5"]
    build_types: ["Debug", "Release"]
    ci_enabled: false
    featured: true
    documentation: "README.md"

  # --------------------------------------------------------------------------
  # End-to-end MAX22200 chip-and-comm health diagnostic
  # --------------------------------------------------------------------------
  max22200_diagnostic:
    description: "Fault-isolation diagnostic: round-trips CFG_CH0, dumps STATUS+FAULT raw, tries both ACTIVE=1 write paths, then 5 Hz continuous STATUS dump for scope probing"
    source_file: "max22200_diagnostic.cpp"
    category: "test"
    idf_versions: ["release/v5.5"]
    build_types: ["Debug"]
    ci_enabled: false
    featured: false
    documentation: "README.md"

  # --------------------------------------------------------------------------
  # Single-channel C21 24V solenoid hit-and-hold cycle test (CH0 / OUT0)
  # --------------------------------------------------------------------------
  c21_cycle_test:
    description: "Cycle a Parker C21 24V solenoid on CH0 (102 mA hit / 51 mA hold) with continuous STATUS+FAULT telemetry and DPM detection"
    source_file: "c21_cycle_test.cpp"
    category: "test"
    idf_versions: ["release/v5.5"]
    build_types: ["Debug", "Release"]
    ci_enabled: false
    featured: false
    documentation: "README.md"

  # --------------------------------------------------------------------------
  # C21 + DPM (plunger movement detection) tuning + CSV logging
  # --------------------------------------------------------------------------
  c21_dpm_tuning_test:
    description: "Cycle C21 with DPM enabled, poll FAULT @ 1 kHz during HIT window, emit CSV stream + summary stats so DPM ISTART/IPTH/TDEB can be tuned against real plunger movement"
    source_file: "c21_dpm_tuning_test.cpp"
    category: "test"
    idf_versions: ["release/v5.5"]
    build_types: ["Debug", "Release"]
    ci_enabled: false
    featured: false
    documentation: "README.md"

# ============================================================================
# BUILD CONFIGURATION (ESP-IDF Standard Build Types)
# ============================================================================

build_config:
  # Standard ESP-IDF/CMake build types
  # These match CMAKE_BUILD_TYPE values in ESP-IDF
  build_types:
    Debug:
      description: "Debug build with symbols, verbose logging, assertions"
      cmake_build_type: "Debug"
      optimization: "-O0"
      debug_level: "-g3"
      defines: ["DEBUG"]

    Release:
      description: "Release build optimized for performance"
      cmake_build_type: "Release"
      optimization: "-O2"
      debug_level: "-g0"
      defines: ["NDEBUG"]

  build_directory_pattern: "build-app-{app_type}-type-{build_type}-target-{target}-idf-{idf_version}"
  project_name_pattern: "esp32_max22200_{app_type}_app"

ci_config:
  # CI build timeout
  timeout_minutes: 30
  # Fail fast on first error
  fail_fast: false
  # Apps to exclude from specific build types (if needed)
  exclude_combinations: []
  # Apps that require special handling
  special_apps: []
