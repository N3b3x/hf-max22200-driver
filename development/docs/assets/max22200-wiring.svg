<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" width="900" height="540" role="img" aria-labelledby="t-max w-max">
  <title id="t-max">MAX22200 typical MCU wiring diagram</title>
  <desc id="w-max">SPI wiring between an MCU and the MAX22200 octal half-bridge solenoid driver, showing supply, SPI, and load output connections in half-bridge and full-bridge configurations.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      .panel    { fill: #ffffff; }
      .box      { fill: #f4f6f8; stroke: #1a365d; stroke-width: 2; }
      .chip     { fill: #fef5e7; stroke: #c05621; stroke-width: 2; }
      .wire-pwr { stroke: #c53030; stroke-width: 3; fill: none; stroke-linecap: round; }
      .wire-gnd { stroke: #4a5568; stroke-width: 3; fill: none; stroke-linecap: round; }
      .wire-spi { stroke: #2b6cb0; stroke-width: 2.5; fill: none; stroke-linecap: round; }
      .wire-load{ stroke: #c05621; stroke-width: 2; fill: none; stroke-linecap: round; }
      .head     { font-family: system-ui, sans-serif; font-size: 16px; font-weight: 600; fill: #1a365d; text-anchor: middle; }
      .title    { font-family: system-ui, sans-serif; font-size: 13px; font-weight: 600; fill: #1a365d; text-anchor: middle; }
      .titleL   { font-family: system-ui, sans-serif; font-size: 13px; font-weight: 600; fill: #1a365d; text-anchor: start; }
      .small    { font-family: system-ui, sans-serif; font-size: 11px; fill: #4a5568; text-anchor: middle; }
      .smallL   { font-family: system-ui, sans-serif; font-size: 11px; fill: #4a5568; text-anchor: start; }
      .pinL     { font-family: "DejaVu Sans Mono", Consolas, monospace; font-size: 12px; fill: #1a202c; text-anchor: start; }
      .pinR     { font-family: "DejaVu Sans Mono", Consolas, monospace; font-size: 12px; fill: #1a202c; text-anchor: end; }
      .wlbl     { font-family: system-ui, sans-serif; font-size: 11px; font-weight: 600; text-anchor: middle; }
      .legend   { font-family: system-ui, sans-serif; font-size: 11px; fill: #4a5568; }
    ]]></style>
    <marker id="ar-max" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#2b6cb0"/>
    </marker>
    <marker id="ar-load" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#c05621"/>
    </marker>
  </defs>
  <rect class="panel" width="900" height="540"/>

  <!-- Title -->
  <text class="head"  x="450" y="26">MAX22200 &#8212; typical MCU wiring</text>
  <text class="small" x="450" y="44">8-channel half-bridge solenoid / motor driver &#183; SPI control &#183; internal current sense (no external R<tspan baseline-shift="sub" font-size="9">SENSE</tspan>)</text>

  <!-- PPPPPPPPPPP MCU box (left) PPPPPPPPPPP -->
  <rect class="box" x="40" y="80" width="140" height="180" rx="6"/>
  <text class="title" x="110" y="104">MCU</text>
  <text class="smallL" x="56" y="122">SPI master</text>

  <text class="pinL" x="56" y="150">3V3</text>
  <text class="pinL" x="56" y="170">GND</text>
  <text class="pinL" x="56" y="196">SCLK</text>
  <text class="pinL" x="56" y="216">MOSI</text>
  <text class="pinL" x="56" y="236">MISO</text>
  <text class="pinL" x="56" y="256">CS</text>

  <!-- PPPPPPPPPPP MAX22200 chip (center) PPPPPPPPPPP -->
  <rect class="chip" x="290" y="66" width="320" height="240" rx="10"/>
  <text class="head"  x="450" y="92">MAX22200</text>
  <text class="small" x="450" y="110">8 &#215; half-bridge, 1 A RMS/ch</text>
  <text class="small" x="450" y="126">HIT / HOLD current profiles</text>

  <!-- Left-side pins -->
  <text class="pinL" x="304" y="156">VDD</text>
  <text class="pinL" x="304" y="176">VS</text>
  <text class="pinL" x="304" y="196">GND</text>
  <text class="pinL" x="304" y="222">SCLK</text>
  <text class="pinL" x="304" y="242">SDI</text>
  <text class="pinL" x="304" y="262">SDO</text>
  <text class="pinL" x="304" y="282">CS</text>

  <!-- Right-side pins (outputs) -->
  <text class="pinR" x="596" y="152">OUT0A</text>
  <text class="pinR" x="596" y="168">OUT0B</text>
  <text class="pinR" x="596" y="190">OUT1A</text>
  <text class="pinR" x="596" y="206">OUT1B</text>
  <text class="pinR" x="596" y="228">OUT2A</text>
  <text class="pinR" x="596" y="244">OUT2B</text>
  <text class="pinR" x="596" y="266">OUT3A</text>
  <text class="pinR" x="596" y="282">OUT3B</text>
  <text class="small" x="570" y="300">...OUT7A/B</text>

  <!-- PPPPPPPPPPP Power wires PPPPPPPPPPP -->
  <!-- 3V3 to VDD -->
  <polyline class="wire-pwr" points="180,146 240,146 240,152 290,152"/>
  <text class="wlbl" fill="#c53030" x="236" y="142">3V3</text>

  <!-- VS supply rail (external high-voltage supply) -->
  <line class="wire-pwr" x1="250" y1="172" x2="290" y2="172"/>
  <text class="wlbl" fill="#c53030" x="268" y="168">VS</text>
  <rect class="box" x="220" y="60" width="56" height="30" rx="4"/>
  <text class="small" x="248" y="80">V<tspan baseline-shift="sub" font-size="9">S</tspan></text>
  <line class="wire-pwr" x1="248" y1="90" x2="248" y2="172"/>

  <!-- GND -->
  <polyline class="wire-gnd" points="180,166 224,166 224,192 290,192"/>
  <text class="wlbl" fill="#4a5568" x="224" y="160">GND</text>

  <!-- PPPPPPPPPPP SPI wires PPPPPPPPPPP -->
  <line class="wire-spi" x1="180" y1="192" x2="200" y2="192" />
  <polyline class="wire-spi" points="200,192 200,218 290,218"/>
  <text class="wlbl" fill="#2b6cb0" x="236" y="214">SCLK</text>

  <line class="wire-spi" x1="180" y1="212" x2="208" y2="212"/>
  <polyline class="wire-spi" points="208,212 208,238 290,238"/>
  <text class="wlbl" fill="#2b6cb0" x="236" y="234">SDI</text>

  <line class="wire-spi" x1="180" y1="232" x2="216" y2="232"/>
  <polyline class="wire-spi" points="216,232 216,258 290,258"/>
  <text class="wlbl" fill="#2b6cb0" x="236" y="254">SDO</text>

  <line class="wire-spi" x1="180" y1="252" x2="224" y2="252"/>
  <polyline class="wire-spi" points="224,252 224,278 290,278"/>
  <text class="wlbl" fill="#2b6cb0" x="236" y="274">CS</text>

  <!-- PPPPPPPPPPP Load outputs (right side) PPPPPPPPPPP -->
  <!-- Representative load on OUT0A -->
  <line class="wire-load" x1="610" y1="148" x2="660" y2="148"/>
  <rect class="box" x="660" y="136" width="70" height="26" rx="4"/>
  <text class="small" x="695" y="153">Solenoid</text>
  <line class="wire-gnd" x1="730" y1="149" x2="770" y2="149"/>
  <text class="pinL" x="774" y="153">GND</text>

  <!-- Representative load on OUT1A/B (full-bridge) -->
  <line class="wire-load" x1="610" y1="186" x2="660" y2="186"/>
  <rect class="box" x="660" y="174" width="70" height="26" rx="4"/>
  <text class="small" x="695" y="191">Motor</text>
  <line class="wire-load" x1="730" y1="187" x2="770" y2="187"/>
  <polyline class="wire-load" points="770,187 770,202 610,202"/>
  <text class="pinL" x="774" y="193">OUT1B</text>

  <!-- Ellipsis for remaining channels -->
  <line class="wire-load" x1="610" y1="224" x2="640" y2="224" marker-end="url(#ar-load)"/>
  <line class="wire-load" x1="610" y1="240" x2="640" y2="240" marker-end="url(#ar-load)"/>
  <line class="wire-load" x1="610" y1="262" x2="640" y2="262" marker-end="url(#ar-load)"/>
  <line class="wire-load" x1="610" y1="278" x2="640" y2="278" marker-end="url(#ar-load)"/>
  <text class="smallL" x="648" y="256">to loads</text>

  <!-- PPPPPPPPPPP Bottom panels PPPPPPPPPPP -->

  <!-- Half-bridge mode panel -->
  <rect class="box" x="40" y="330" width="260" height="100" rx="6"/>
  <text class="titleL" x="56" y="352">Half-bridge mode</text>

  <text class="pinL" x="56" y="376">OUTA</text>
  <line class="wire-load" x1="106" y1="372" x2="136" y2="372"/>
  <rect x="136" y="362" width="60" height="22" rx="4" fill="#ebf4ff" stroke="#2c5282" stroke-width="1.4"/>
  <text class="small" x="166" y="377">Load</text>
  <line class="wire-gnd" x1="196" y1="373" x2="232" y2="373"/>
  <text class="pinL" x="236" y="377">GND</text>

  <text class="smallL" x="56" y="400">OUTB unused (or flyback return)</text>
  <text class="smallL" x="56" y="416">Typical: solenoid valve, relay coil</text>

  <!-- Full-bridge mode panel -->
  <rect class="box" x="320" y="330" width="260" height="100" rx="6"/>
  <text class="titleL" x="336" y="352">Full-bridge mode</text>

  <text class="pinL" x="336" y="376">OUTA</text>
  <line class="wire-load" x1="386" y1="372" x2="416" y2="372"/>
  <rect x="416" y="362" width="60" height="22" rx="4" fill="#ebf4ff" stroke="#2c5282" stroke-width="1.4"/>
  <text class="small" x="446" y="377">Load</text>
  <line class="wire-load" x1="476" y1="373" x2="512" y2="373"/>
  <text class="pinL" x="516" y="377">OUTB</text>

  <text class="smallL" x="336" y="400">Bidirectional current through load</text>
  <text class="smallL" x="336" y="416">Typical: DC motor, H-bridge actuator</text>

  <!-- PPPPPPPPPPP Notes panel (right) PPPPPPPPPPP -->
  <rect class="box" x="600" y="330" width="280" height="100" rx="6"/>
  <text class="titleL" x="616" y="352">Notes</text>
  <text class="smallL" x="616" y="372">&#8226; Internal current sensing (ICS) &#8212; no</text>
  <text class="smallL" x="622" y="386">external sense resistor needed</text>
  <text class="smallL" x="616" y="404">&#8226; Internal flyback diodes per output;</text>
  <text class="smallL" x="622" y="418">add external Schottky for fast loads</text>

  <!-- PPPPPPPPPPP Legend PPPPPPPPPPP -->
  <g transform="translate(40, 460)">
    <text class="titleL" x="0" y="0">Legend</text>

    <line class="wire-pwr" x1="0" y1="18" x2="22" y2="18"/>
    <text class="legend" x="28" y="22">Power (VDD / VS)</text>

    <line class="wire-gnd" x1="0" y1="38" x2="22" y2="38"/>
    <text class="legend" x="28" y="42">Ground</text>

    <line class="wire-spi" x1="0" y1="58" x2="22" y2="58"/>
    <text class="legend" x="28" y="62">SPI bus (SCLK, SDI, SDO, CS)</text>

    <line class="wire-load" x1="340" y1="18" x2="362" y2="18"/>
    <text class="legend" x="368" y="22">Load / output wiring</text>

    <rect class="chip" x="340" y="30" width="22" height="14" rx="3"/>
    <text class="legend" x="368" y="42">MAX22200 IC</text>

    <rect class="box" x="340" y="52" width="22" height="14" rx="3"/>
    <text class="legend" x="368" y="62">MCU / peripheral / load</text>

    <text class="legend" x="560" y="22">SPI: Mode 0 or 3, up to 10 MHz, MSB first</text>
    <text class="legend" x="560" y="42">VS: motor supply rail (separate from VDD)</text>
    <text class="legend" x="560" y="62">8 channels &#215; 2 outputs (OUTnA / OUTnB)</text>
  </g>
</svg>
